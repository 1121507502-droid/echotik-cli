name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -o "dist/echotik-${{ matrix.suffix }}${{ matrix.ext }}" .
      - name: Package
        run: |
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "echotik-${{ github.ref_name }}-${{ matrix.suffix }}.zip" "echotik-${{ matrix.suffix }}${{ matrix.ext }}"
          else
            tar -czf "echotik-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz" "echotik-${{ matrix.suffix }}${{ matrix.ext }}"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/echotik-${{ github.ref_name }}-${{ matrix.suffix }}.*
